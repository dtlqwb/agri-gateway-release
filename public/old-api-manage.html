<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新I日供应商API管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f7fa; }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .stat-card h3 {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    button:hover { background: #5568d3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    button.secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    button.secondary:hover { background: #e0e0e0; }
    
    input[type="date"] {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    
    th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }
    
    tr:hover { background: #f8f9fa; }
    
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .badge-success { background: #d4edda; color: #155724; }
    .badge-warning { background: #fff3cd; color: #856404; }
    .badge-error { background: #f8d7da; color: #721c24; }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    
    .success {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚜 新I日供应商API管理</h1>
    <p>管理和监控新I日供应商API数据同步</p>
  </div>

  <div class="container">
    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>总作业面积</h3>
        <div class="stat-value" id="totalAcre">-</div>
        <div class="stat-label">亩</div>
      </div>
      <div class="stat-card">
        <h3>设备数量</h3>
        <div class="stat-value" id="deviceCount">-</div>
        <div class="stat-label">台</div>
      </div>
      <div class="stat-card">
        <h3>记录总数</h3>
        <div class="stat-value" id="recordCount">-</div>
        <div class="stat-label">条</div>
      </div>
      <div class="stat-card">
        <h3>合作社数量</h3>
        <div class="stat-value" id="orgCount">-</div>
        <div class="stat-label">个</div>
      </div>
    </div>

    <!-- 控制面板 -->
    <div class="section">
      <h2>⚙️ 同步控制</h2>
      <div class="controls">
        <button onclick="importDevices()">📥 导入设备映射表</button>
        <button onclick="syncToday()" class="secondary">🔄 同步昨天数据</button>
        <input type="date" id="syncDate" />
        <button onclick="syncCustomDate()" class="secondary">同步指定日期</button>
        <input type="date" id="startDate" />
        <span style="line-height: 36px;">至</span>
        <input type="date" id="endDate" />
        <button onclick="syncDateRange()" class="secondary">批量同步</button>
      </div>
      <div id="message"></div>
    </div>

    <!-- 合作社统计 -->
    <div class="section">
      <h2>📊 合作社作业统计</h2>
      <div id="orgStats">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 设备列表 -->
    <div class="section">
      <h2>📱 设备列表</h2>
      <div id="deviceList">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let currentUser = null;

    // 检查登录状态
    function checkAuth() {
      const saved = localStorage.getItem('admin_user');
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          return true;
        } catch (e) {
          localStorage.removeItem('admin_user');
        }
      }
      return false;
    }

    // 显示登录弹窗
    function showLoginModal() {
      const overlay = document.createElement('div');
      overlay.id = 'login-overlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;';
      overlay.innerHTML = `
        <div style="background:#fff;border-radius:16px;padding:30px 24px;width:90%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
          <h2 style="font-size:22px;text-align:center;margin-bottom:8px;color:#667eea;">🔐 管理员登录</h2>
          <p style="text-align:center;color:#999;font-size:13px;margin-bottom:20px;">新I日供应商API管理</p>
          <div id="login-error" style="color:#f44336;font-size:13px;margin-bottom:12px;display:none;"></div>
          <div style="margin-bottom:16px;">
            <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;">用户名</label>
            <input id="login-username" type="text" placeholder="请输入用户名" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
          </div>
          <div style="margin-bottom:20px;">
            <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;">密码</label>
            <input id="login-password" type="password" placeholder="请输入密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
          </div>
          <button id="login-btn" style="width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:15px;font-weight:600;cursor:pointer;">登 录</button>
        </div>
      `;
      document.body.appendChild(overlay);

      // 回车登录
      document.getElementById('login-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
      document.getElementById('login-username').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('login-password').focus();
      });

      document.getElementById('login-btn').addEventListener('click', doLogin);
      document.getElementById('login-username').focus();
    }

    // 执行登录
    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');

      if (!username || !password) {
        errorEl.textContent = '请输入用户名和密码';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        }).then(r => r.json());

        if (res.code === 0) {
          currentUser = res.data;
          localStorage.setItem('admin_user', JSON.stringify(currentUser));
          document.getElementById('login-overlay').remove();
          loadAll();
        } else {
          errorEl.textContent = res.msg || '登录失败';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = '网络错误，请重试';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    // 退出登录
    function doLogout() {
      if (!confirm('确定要退出登录吗？')) return;
      currentUser = null;
      localStorage.removeItem('admin_user');
      location.reload();
    }

    // 获取请求头
    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': currentUser ? currentUser.token : ''
      };
    }

    // 加载统计数据
    async function loadStats() {
      try {
        const response = await fetch(`${API_BASE}/api/old-api/stats`);
        const result = await response.json();
        
        if (result.code === 0) {
          document.getElementById('totalAcre').textContent = 
            parseFloat(result.data.total.total_acre || 0).toFixed(2);
          document.getElementById('deviceCount').textContent = result.data.total.device_count || 0;
          document.getElementById('recordCount').textContent = result.data.total.record_count || 0;
          document.getElementById('orgCount').textContent = result.data.byOrg.length || 0;
          
          renderOrgStats(result.data.byOrg);
        }
      } catch (error) {
        console.error('加载统计失败:', error);
      }
    }

    // 渲染合作社统计
    function renderOrgStats(orgs) {
      const container = document.getElementById('orgStats');
      
      if (!orgs || orgs.length === 0) {
        container.innerHTML = '<div class="loading">暂无数据</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>合作社名称</th>
              <th>作业面积(亩)</th>
              <th>设备数量</th>
              <th>记录数</th>
            </tr>
          </thead>
          <tbody>
      `;

      orgs.forEach(org => {
        html += `
          <tr>
            <td>${org.cooperative_name || '-'}</td>
            <td><strong>${parseFloat(org.total_acre || 0).toFixed(2)}</strong></td>
            <td>${org.device_count || 0}</td>
            <td>${org.record_count || 0}</td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // 加载设备列表
    async function loadDevices() {
      try {
        const response = await fetch(`${API_BASE}/api/old-api/devices`);
        const result = await response.json();
        
        if (result.code === 0) {
          renderDeviceList(result.data);
        }
      } catch (error) {
        console.error('加载设备列表失败:', error);
      }
    }

    // 渲染设备列表
    function renderDeviceList(devices) {
      const container = document.getElementById('deviceList');
      
      if (!devices || devices.length === 0) {
        container.innerHTML = '<div class="loading">暂无设备数据，请先导入设备映射表</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>终端编号</th>
              <th>合作社名称</th>
              <th>机手姓名</th>
            </tr>
          </thead>
          <tbody>
      `;

      devices.forEach(device => {
        html += `
          <tr>
            <td><code>${device.macid}</code></td>
            <td>${device.cooperative_name || '-'}</td>
            <td>${device.driver_name || '-'}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      html += `<p style="margin-top: 10px; color: #999;">共 ${devices.length} 台设备</p>`;
      container.innerHTML = html;
    }

    // 导入设备映射表
    async function importDevices() {
      showMessage('正在导入...', 'info');
      try {
        const response = await fetch(`${API_BASE}/api/old-api/import-devices`, {
          method: 'POST'
        });
        const result = await response.json();
        
        if (result.code === 0) {
          showMessage(`✅ 导入成功: ${result.data.imported} 条, 跳过 ${result.data.skipped} 条`, 'success');
          loadDevices();
        } else {
          showMessage(`❌ 导入失败: ${result.msg}`, 'error');
        }
      } catch (error) {
        showMessage(`❌ 请求失败: ${error.message}`, 'error');
      }
    }

    // 同步昨天数据
    async function syncToday() {
      showMessage('正在同步昨天数据...', 'info');
      try {
        const response = await fetch(`${API_BASE}/api/old-api/sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const result = await response.json();
        
        if (result.code === 0) {
          const data = result.data;
          showMessage(`✅ 同步完成: 成功 ${data.successCount}, 失败 ${data.failCount}, 总面积 ${data.totalAcre?.toFixed(2) || 0} 亩`, 'success');
          loadStats();
        } else {
          showMessage(`❌ 同步失败: ${result.msg}`, 'error');
        }
      } catch (error) {
        showMessage(`❌ 请求失败: ${error.message}`, 'error');
      }
    }

    // 同步指定日期
    async function syncCustomDate() {
      const date = document.getElementById('syncDate').value;
      if (!date) {
        showMessage('⚠️ 请选择日期', 'error');
        return;
      }

      showMessage(`正在同步 ${date} 的数据...`, 'info');
      try {
        const response = await fetch(`${API_BASE}/api/old-api/sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date })
        });
        const result = await response.json();
        
        if (result.code === 0) {
          const data = result.data;
          showMessage(`✅ 同步完成: 成功 ${data.successCount}, 失败 ${data.failCount}`, 'success');
          loadStats();
        } else {
          showMessage(`❌ 同步失败: ${result.msg}`, 'error');
        }
      } catch (error) {
        showMessage(`❌ 请求失败: ${error.message}`, 'error');
      }
    }

    // 批量同步日期范围
    async function syncDateRange() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      
      if (!startDate || !endDate) {
        showMessage('⚠️ 请选择日期范围', 'error');
        return;
      }

      showMessage(`正在批量同步 ${startDate} 至 ${endDate}...`, 'info');
      try {
        const response = await fetch(`${API_BASE}/api/old-api/sync`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ startDate, endDate })
        });
        const result = await response.json();
        
        if (result.code === 0) {
          showMessage(`✅ 批量同步完成`, 'success');
          loadStats();
        } else {
          showMessage(`❌ 同步失败: ${result.msg}`, 'error');
        }
      } catch (error) {
        showMessage(`❌ 请求失败: ${error.message}`, 'error');
      }
    }

    // 显示消息
    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.className = type;
      msgDiv.textContent = text;
      
      if (type !== 'info') {
        setTimeout(() => {
          msgDiv.textContent = '';
          msgDiv.className = '';
        }, 5000);
      }
    }

    // 页面加载时初始化
    window.onload = () => {
      loadStats();
      loadDevices();
      
      // 设置默认日期
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const dateStr = yesterday.toISOString().split('T')[0];
      document.getElementById('syncDate').value = dateStr;
    };
  </script>
</body>
</html>
