<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员账号管理 - 智慧农机监管平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .back { font-size: 13px; opacity: 0.9; cursor: pointer; margin-bottom: 4px; }

    .container { padding: 12px; }

    .admin-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .admin-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    /* 管理员列表 */
    .admin-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
    .admin-item:last-child { border-bottom: none; }
    .admin-item .avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 600; flex-shrink: 0; }
    .admin-item .avatar.super { background: linear-gradient(135deg, #f44336, #d32f2f); }
    .admin-item .avatar.viewer { background: linear-gradient(135deg, #ff9800, #f57c00); }
    .admin-item .info { flex: 1; min-width: 0; }
    .admin-item .name { font-size: 14px; font-weight: 600; }
    .admin-item .username { font-size: 12px; color: #999; }
    .admin-item .role-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .admin-item .role-badge.super { background: #ffebee; color: #f44336; }
    .admin-item .role-badge.viewer { background: #fff3e0; color: #ff9800; }
    .admin-item .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .admin-item .status-badge.active { background: #e8f5e9; color: #2e7d32; }
    .admin-item .status-badge.disabled { background: #f5f5f5; color: #999; }
    .admin-item .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .admin-item .actions button { padding: 4px 10px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; }
    .admin-item .actions .edit-btn { background: #e8f0fe; color: #1a73e8; }
    .admin-item .actions .del-btn { background: #ffebee; color: #f44336; }
    .admin-item .actions .toggle-btn { background: #f5f5f5; color: #666; }

    /* 表单 */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-secondary { background: #f5f5f5; color: #333; }
    .btn-success { background: #4caf50; color: #fff; }
    .btn-block { width: 100%; text-align: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading { text-align: center; padding: 20px; color: #999; }
    .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid #ddd; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px 20px; color: #999; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .text { font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="back" onclick="window.location.href='index.html'">← 返回</div>
    <h1>👥 管理员账号管理</h1>
  </div>

  <div class="container">
    <!-- 添加管理员 -->
    <div class="admin-card">
      <h3>➕ 添加管理员</h3>
      <div class="form-row">
        <div class="form-group">
          <label>用户名 *</label>
          <input type="text" id="add-username" placeholder="登录用户名">
        </div>
        <div class="form-group">
          <label>密码 *</label>
          <input type="password" id="add-password" placeholder="登录密码">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="add-name" placeholder="真实姓名">
        </div>
        <div class="form-group">
          <label>角色</label>
          <select id="add-role">
            <option value="viewer">👁️ 只读（农业局）</option>
            <option value="super">🔑 超管（全部权限）</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="addAdmin()">✅ 添加管理员</button>
    </div>

    <!-- 管理员列表 -->
    <div class="admin-card">
      <h3>📋 管理员列表</h3>
      <div id="admin-list">
        <div class="loading"><div class="spinner"></div><br>加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let currentUser = null;

    // 页面加载时检查登录状态
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('admin_user');
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          if (currentUser.role !== 'super') {
            alert('⚠️ 此页面需要超管权限');
            window.location.href = 'index.html';
            return;
          }
          loadAdminList();
        } catch(e) {
          window.location.href = 'index.html';
        }
      } else {
        window.location.href = 'index.html';
      }
    });

    // 加载管理员列表
    async function loadAdminList() {
      try {
        const res = await fetch(`${API}/api/admins`, {
          headers: { 'Authorization': currentUser.token }
        }).then(r => r.json());

        const listEl = document.getElementById('admin-list');
        
        if (res.code === 0 && res.data.length > 0) {
          listEl.innerHTML = res.data.map(admin => `
            <div class="admin-item">
              <div class="avatar ${admin.role}">
                ${admin.role === 'super' ? '🔑' : '👁️'}
              </div>
              <div class="info">
                <div class="name">
                  ${admin.name || admin.username}
                  <span class="role-badge ${admin.role}">
                    ${admin.role === 'super' ? '超管' : '只读'}
                  </span>
                </div>
                <div class="username">@${admin.username}</div>
              </div>
              <span class="status-badge ${admin.status === 1 ? 'active' : 'disabled'}">
                ${admin.status === 1 ? '启用' : '禁用'}
              </span>
              <div class="actions">
                <button class="toggle-btn" onclick="toggleStatus(${admin.id}, ${admin.status})">
                  ${admin.status === 1 ? '禁用' : '启用'}
                </button>
                <button class="edit-btn" onclick="resetPassword(${admin.id}, '${admin.username}')">重置密码</button>
                ${admin.id !== currentUser.id ? `<button class="del-btn" onclick="deleteAdmin(${admin.id}, '${admin.username}')">删除</button>` : ''}
              </div>
            </div>
          `).join('');
        } else {
          listEl.innerHTML = '<div class="empty-state"><div class="icon"></div><div class="text">暂无管理员账号</div></div>';
        }
      } catch (e) {
        document.getElementById('admin-list').innerHTML = `<div class="empty-state"><div class="icon">❌</div><div class="text">加载失败: ${e.message}</div></div>`;
      }
    }

    // 添加管理员
    async function addAdmin() {
      const username = document.getElementById('add-username').value.trim();
      const password = document.getElementById('add-password').value.trim();
      const name = document.getElementById('add-name').value.trim();
      const role = document.getElementById('add-role').value;

      if (!username || !password) {
        alert('请填写用户名和密码');
        return;
      }

      try {
        const res = await fetch(`${API}/api/admins`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': currentUser.token
          },
          body: JSON.stringify({ username, password, name, role })
        }).then(r => r.json());

        if (res.code === 0) {
          alert('✅ 添加成功');
          document.getElementById('add-username').value = '';
          document.getElementById('add-password').value = '';
          document.getElementById('add-name').value = '';
          loadAdminList();
        } else {
          alert('❌ ' + res.msg);
        }
      } catch (e) {
        alert('❌ 添加失败: ' + e.message);
      }
    }

    // 切换状态
    async function toggleStatus(id, currentStatus) {
      const newStatus = currentStatus === 1 ? 0 : 1;
      
      if (!confirm(`确定要${newStatus === 1 ? '启用' : '禁用'}该账号吗？`)) return;

      try {
        const res = await fetch(`${API}/api/admins/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': currentUser.token
          },
          body: JSON.stringify({ status: newStatus })
        }).then(r => r.json());

        if (res.code === 0) {
          alert('✅ 操作成功');
          loadAdminList();
        } else {
          alert('❌ ' + res.msg);
        }
      } catch (e) {
        alert('❌ 操作失败: ' + e.message);
      }
    }

    // 重置密码
    async function resetPassword(id, username) {
      const newPassword = prompt(`重置 ${username} 的密码：`);
      if (!newPassword) return;

      try {
        const res = await fetch(`${API}/api/admins/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': currentUser.token
          },
          body: JSON.stringify({ password: newPassword })
        }).then(r => r.json());

        if (res.code === 0) {
          alert('✅ 密码重置成功');
        } else {
          alert('❌ ' + res.msg);
        }
      } catch (e) {
        alert('❌ 重置失败: ' + e.message);
      }
    }

    // 删除管理员
    async function deleteAdmin(id, username) {
      if (!confirm(`⚠️ 确定要删除管理员 ${username} 吗？此操作不可恢复！`)) return;

      try {
        const res = await fetch(`${API}/api/admins/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': currentUser.token
          }
        }).then(r => r.json());

        if (res.code === 0) {
          alert('✅ 删除成功');
          loadAdminList();
        } else {
          alert('❌ ' + res.msg);
        }
      } catch (e) {
        alert('❌ 删除失败: ' + e.message);
      }
    }
  </script>
</body>
</html>
