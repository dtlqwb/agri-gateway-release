name: Deploy to Production

on:
  push:
    branches: [ main ]  # 当你推送到 main 分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install --production

    - name: Deploy to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "."
        target: "/home/ubuntu/agri-gateway"
        strip_components: 1
        rm: true
        exclude: ".env"

    - name: Generate .env file on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/agri-gateway
          cat > .env << EOF
          # 服务基础配置
          PORT=${{ secrets.PORT }}
          TOKEN_SECRET=${{ secrets.TOKEN_SECRET }}
          ENABLE_SCHEDULER=${{ secrets.ENABLE_SCHEDULER }}
          
          # 云途安（新供应商）配置
          YT_API_BASE=${{ secrets.YT_API_BASE }}
          YT_USERNAME=${{ secrets.YT_USERNAME }}
          YT_PASSWORD=${{ secrets.YT_PASSWORD }}
          
          # 旧供应商API配置
          ENABLE_OLD_SYNC=${{ secrets.ENABLE_OLD_SYNC }}
          OLD_API_BASE=${{ secrets.OLD_API_BASE }}
          OLD_API_USER=${{ secrets.OLD_API_USER }}
          OLD_API_KEY=${{ secrets.OLD_API_KEY }}
          ENABLE_OLD_CRAWLER=false
          
          # MySQL数据库配置
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          EOF

    - name: Restart Application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/agri-gateway
          npm install --production
          pm2 restart agri-gateway || pm2 start index.js --name agri-gateway
          pm2 save
